[flake8]
max-line-length = 110
# E402: module import not at top — caused by sys.path.insert() needed for src/ resolution
# W503: line break before binary operator — conflicts with Black style
extend-ignore = E402, W503
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    env,
    build,
    dist,
    wandb,
    data,
